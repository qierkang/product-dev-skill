name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate shell scripts
        run: find install shared/scripts -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Validate Chinese README
        run: python3 scripts/readme-gate.py --readme README.md
      - name: Validate English README
        run: python3 scripts/readme-gate.py --readme docs/README_en.md
